<div class="min-h-screen flex items-center justify-center bg-primary-50 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <h1 class="text-3xl font-bold text-primary-700 text-center">
      Create account
    </h1>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-8 space-y-5">

      <!-- Full Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Full Name
        </label>
        <input
          type="text"
          formControlName="full_name"
          placeholder="John Doe"
          class="w-full rounded-lg border px-3 py-2 outline-none transition focus:border-primary-500 focus:ring-2 focus:ring-primary-200"
        />
        <p
          *ngIf="form.controls.full_name.touched && form.controls.full_name.invalid"
          class="text-sm text-red-600 mt-1"
        >
          Please enter a valid full name.
        </p>
      </div>

      <!-- Mobile -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Mobile Number
        </label>
        <input
          type="text"
          formControlName="mobile"
          placeholder="Mobile number"
          class="w-full rounded-lg border px-3 py-2 outline-none transition focus:border-primary-500 focus:ring-2 focus:ring-primary-200"
        />
        <p
          *ngIf="form.controls.mobile.touched && form.controls.mobile.invalid"
          class="text-sm text-red-600 mt-1"
        >
          Please enter a valid mobile number.
        </p>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Email
        </label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          class="w-full rounded-lg border px-3 py-2 outline-none transition focus:border-primary-500 focus:ring-2 focus:ring-primary-200"
        />
        <p
          *ngIf="form.controls.email.touched && form.controls.email.invalid"
          class="text-sm text-red-600 mt-1"
        >
          Please enter a valid email.
        </p>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Password
        </label>
        <input
          type="password"
          formControlName="password"
          placeholder="At least 8 characters"
          class="w-full rounded-lg border px-3 py-2 outline-none transition focus:border-primary-500 focus:ring-2 focus:ring-primary-200"
        />
        <p
          *ngIf="
            form.controls.password.touched && form.controls.password.invalid
          "
          class="text-sm text-red-600 mt-1"
        >
          Password must be at least 8 characters.
        </p>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Confirm Password
        </label>
        <input
          type="password"
          formControlName="confirmPassword"
          placeholder="Re-enter password"
          class="w-full rounded-lg border px-3 py-2 outline-none transition focus:border-primary-500 focus:ring-2 focus:ring-primary-200"
        />

        <p
          *ngIf="form.touched && form.errors?.['passwordMismatch']"
          class="text-sm text-red-600 mt-1"
        >
          Passwords do not match.
        </p>
      </div>
      
      <!-- Button -->
      <button
        type="submit"
        [disabled]="auth.signupLoading()"
        (click)="this.submit()"
        class="w-full py-2.5 rounded-lg font-semibold text-white bg-primary-500 hover:bg-primary-600 disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-primary-300 active:scale-[0.98] transition"
      >
        <span *ngIf="!auth.signupLoading()">Create account</span>
        <span *ngIf="auth.signupLoading()">Creating...</span>
      </button>
    </form>

    <p *ngIf="auth.signupError()" class="text-center text-sm text-red-600 mt-4">
      {{ auth.signupError() }}
    </p>

    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a
        routerLink="/login"
        class="text-primary-600 hover:underline font-medium"
      >
        Sign in
      </a>
    </p>
  </div>
</div>
